<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Piston Pair - Free HTML5 Game</title>
<meta name="description" content="Play Piston Pair - Stack descending clockwork blocks by splitting them mid-air to fill two parallel mechanical shafts.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0a2e">
<meta property="og:title" content="Piston Pair - Free HTML5 Game">
<meta property="og:description" content="Rhythmic one-tap piston lock game. Time the ring. Tap. Stack the blocks.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://balinti.github.io/piston-pair/">
<meta property="og:image" content="https://balinti.github.io/piston-pair/preview.png">
<meta name="twitter:card" content="summary_large_image">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4099346100621490" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0618;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 100%;
    max-width: 420px;
    max-height: 750px;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c"></canvas>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

const DPR = window.devicePixelRatio || 1;
let W, H;

function resize() {
  const rect = container.getBoundingClientRect();
  W = Math.min(rect.width || 420, 420);
  H = Math.min(window.innerHeight, 750);
  container.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', () => { resize(); });

// --- State ---
let state = 'start';
let score = 0;
let best = parseInt(localStorage.getItem('pistonpair_best') || '0');
let hue = 200;
let shakeFrames = 0;
let shakeAmt = 0;
let particles = [];
let impactFlashes = [];

// Shaft geometry
const SHAFT_W = 72;
let shaftX, shaftTop, shaftBottom;
function updateShaftGeom() {
  shaftX = W / 2 - SHAFT_W / 2;
  shaftTop = H * 0.10;
  shaftBottom = H * 0.88;
}
updateShaftGeom();

// Block
const BLOCK_H = 36;
const BLOCK_FALL_SPEED_BASE = 2.2;
let block = null;
let stack = []; // y positions of stacked blocks (from bottom up)

// Pistons
// side: 'left' | 'right'
// Each piston has its own ring oscillation speed
let pistons = {
  left:  { x: 0, side: 'left',  ringT: 0, speed: 1.0, active: false, stamping: false, stampT: 0 },
  right: { x: 0, side: 'right', ringT: Math.PI * 0.4, speed: 1.4, active: true, stamping: false, stampT: 0 }
};
let activeSide = 'left'; // which piston is currently firing
let tapConsumed = false;

// Difficulty
let diffTimer = 0;
let fallSpeed = BLOCK_FALL_SPEED_BASE;
let ringSpeedMult = 1.0;

// --- Helpers ---
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function spawnBlock() {
  block = {
    x: shaftX,
    y: shaftTop - BLOCK_H,
    w: SHAFT_W,
    h: BLOCK_H,
    vel: fallSpeed,
    hue: hue,
    locked: false
  };
}

function getStackTop() {
  if (stack.length === 0) return shaftBottom;
  return stack[stack.length - 1].y;
}

function getPistonGeom(side) {
  const pX = side === 'left' ? shaftX - 8 : shaftX + SHAFT_W + 8;
  const py = H * 0.5;
  return { pX, py };
}

function getRingRadius(piston) {
  // Ring expands from 0 to maxR and back, peak at PI
  const t = (Math.sin(piston.ringT) + 1) / 2; // 0..1
  const maxR = 44;
  return t * maxR;
}

function isRingAtWall(piston) {
  const r = getRingRadius(piston);
  const maxR = 44;
  // Perfect window: ring is within 8px of max
  return r >= maxR - 8;
}

function firePiston(side) {
  const p = pistons[side];
  if (p.stamping) return;
  p.stamping = true;
  p.stampT = 0;
  tapConsumed = true;

  const perfect = isRingAtWall(p);
  lockBlock(perfect, side);
}

function lockBlock(perfect, side) {
  if (!block || block.locked) return;

  block.locked = true;
  const stackTop = getStackTop();
  const targetY = stackTop - BLOCK_H;

  // Check if block reached piston zone (roughly mid-height)
  // Accept any lock while block is above stack
  if (block.y > stackTop) {
    // Missed — block went too low
    triggerGameOver();
    return;
  }

  // Snap block to stack
  block.y = targetY;
  block.perfect = perfect;

  stack.push({ y: targetY, hue: block.hue, perfect });

  // Keep stack from growing beyond shaft top
  while (stack.length > 0 && stack[stack.length - 1].y < shaftTop + BLOCK_H) {
    // Stack overflow
    triggerGameOver();
    return;
  }

  score++;
  if (score > best) { best = score; localStorage.setItem('pistonpair_best', best); }

  hue = (hue + 18) % 360;

  // Particles
  spawnImpact(block.x + block.w / 2, block.y + block.h / 2, perfect);

  block = null;

  // Speed up
  fallSpeed = BLOCK_FALL_SPEED_BASE + score * 0.04;
  ringSpeedMult = 1.0 + score * 0.008;

  // Alternate active piston
  activeSide = activeSide === 'left' ? 'right' : 'left';
  pistons.left.active = activeSide === 'left';
  pistons.right.active = activeSide === 'right';

  spawnBlock();
}

function triggerGameOver() {
  state = 'gameover';
  shakeFrames = 28;
  shakeAmt = 10;
  // Burst particles
  if (block) {
    for (let i = 0; i < 24; i++) spawnParticle(block.x + block.w / 2, block.y + block.h / 2, 200);
  }
}

function spawnParticle(x, y, h) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 2 + Math.random() * 5;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1.0,
    decay: 0.025 + Math.random() * 0.03,
    size: 3 + Math.random() * 4,
    hue: h
  });
}

function spawnImpact(x, y, perfect) {
  const count = perfect ? 18 : 8;
  for (let i = 0; i < count; i++) spawnParticle(x, y, hue);
  impactFlashes.push({ x, y, r: 0, maxR: perfect ? 60 : 30, life: 1.0 });
}

function initGame() {
  score = 0;
  hue = 200;
  particles = [];
  impactFlashes = [];
  stack = [];
  fallSpeed = BLOCK_FALL_SPEED_BASE;
  ringSpeedMult = 1.0;
  diffTimer = 0;
  activeSide = 'left';
  pistons.left.active = true;
  pistons.right.active = false;
  pistons.left.stamping = false;
  pistons.right.stamping = false;
  pistons.left.stampT = 0;
  pistons.right.stampT = 0;
  pistons.left.ringT = 0;
  pistons.right.ringT = Math.PI * 0.4;
  pistons.left.speed = 1.0;
  pistons.right.speed = 1.4;
  shakeFrames = 0;

  updateShaftGeom();
  spawnBlock();
}

// --- Input ---
function onTap() {
  if (state === 'start') {
    state = 'playing';
    initGame();
    return;
  }
  if (state === 'gameover') {
    state = 'playing';
    initGame();
    return;
  }
  if (state === 'playing') {
    firePiston(activeSide);
  }
}

canvas.addEventListener('pointerdown', e => { e.preventDefault(); onTap(); });
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); onTap(); }
});

// --- Drawing ---
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0618');
  grad.addColorStop(1, '#1a0830');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // subtle grid lines
  ctx.strokeStyle = 'rgba(120,80,200,0.06)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawShaft() {
  // Shaft walls
  ctx.strokeStyle = `hsla(${hue},60%,60%,0.5)`;
  ctx.lineWidth = 2;
  // Left wall
  ctx.beginPath();
  ctx.moveTo(shaftX, shaftTop);
  ctx.lineTo(shaftX, shaftBottom);
  ctx.stroke();
  // Right wall
  ctx.beginPath();
  ctx.moveTo(shaftX + SHAFT_W, shaftTop);
  ctx.lineTo(shaftX + SHAFT_W, shaftBottom);
  ctx.stroke();

  // Shaft floor
  ctx.strokeStyle = `hsla(${hue},70%,65%,0.8)`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(shaftX - 6, shaftBottom);
  ctx.lineTo(shaftX + SHAFT_W + 6, shaftBottom);
  ctx.stroke();

  // Shaft top opening
  ctx.strokeStyle = `hsla(${hue},50%,50%,0.3)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(shaftX - 6, shaftTop);
  ctx.lineTo(shaftX + SHAFT_W + 6, shaftTop);
  ctx.stroke();

  // Inner shaft glow
  const innerGrad = ctx.createLinearGradient(shaftX, 0, shaftX + SHAFT_W, 0);
  innerGrad.addColorStop(0, `hsla(${hue},50%,30%,0.04)`);
  innerGrad.addColorStop(0.5, `hsla(${hue},60%,50%,0.10)`);
  innerGrad.addColorStop(1, `hsla(${hue},50%,30%,0.04)`);
  ctx.fillStyle = innerGrad;
  ctx.fillRect(shaftX, shaftTop, SHAFT_W, shaftBottom - shaftTop);
}

function drawStack() {
  for (let i = 0; i < stack.length; i++) {
    const s = stack[i];
    drawBlock(shaftX, s.y, SHAFT_W, BLOCK_H, s.hue, s.perfect ? 0.95 : 0.7, i);
  }
}

function drawBlock(x, y, w, h, bHue, brightness, idx) {
  // Block body
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, `hsla(${bHue},70%,${Math.round(brightness * 35)}%,0.95)`);
  grad.addColorStop(0.5, `hsla(${bHue},80%,${Math.round(brightness * 55)}%,0.95)`);
  grad.addColorStop(1, `hsla(${bHue},70%,${Math.round(brightness * 35)}%,0.95)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Top highlight
  ctx.fillStyle = `hsla(${bHue},90%,80%,0.3)`;
  ctx.fillRect(x + 2, y + 2, w - 4, 3);

  // Rivet details
  ctx.fillStyle = `hsla(${bHue},50%,80%,0.6)`;
  const rivetY = y + h / 2;
  for (let rx = x + 10; rx < x + w - 6; rx += 18) {
    ctx.beginPath();
    ctx.arc(rx, rivetY, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Border
  ctx.strokeStyle = `hsla(${bHue},80%,75%,0.7)`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x + 0.75, y + 0.75, w - 1.5, h - 1.5);
}

function drawFallingBlock() {
  if (!block) return;
  drawBlock(block.x, block.y, block.w, block.h, block.hue, 0.85, -1);

  // Drop shadow
  ctx.fillStyle = `hsla(${block.hue},60%,20%,0.3)`;
  ctx.fillRect(block.x + 4, block.y + block.h, block.w - 8, 8);
}

function drawPiston(side, p, dt) {
  const isActive = side === activeSide;
  const { pX, py } = getPistonGeom(side);
  const isLeft = side === 'left';

  // Piston arm
  const armLen = 40;
  const armX = isLeft ? pX - armLen : pX;
  const armDir = isLeft ? 1 : -1;

  // Stamp animation
  let stampOffset = 0;
  if (p.stamping) {
    const t = p.stampT;
    if (t < 0.3) stampOffset = (t / 0.3) * 28 * armDir;
    else if (t < 0.6) stampOffset = lerp(28, 0, (t - 0.3) / 0.3) * armDir;
    else { p.stamping = false; p.stampT = 0; stampOffset = 0; }
  }

  const headX = isLeft ? shaftX - 4 + stampOffset : shaftX + SHAFT_W + 4 + stampOffset;

  // Draw arm body
  ctx.strokeStyle = isActive ? `hsla(${hue},70%,65%,0.9)` : `hsla(${hue},30%,35%,0.5)`;
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (isLeft) {
    ctx.moveTo(headX - 8, py);
    ctx.lineTo(headX - 8 - armLen, py);
  } else {
    ctx.moveTo(headX + 8, py);
    ctx.lineTo(headX + 8 + armLen, py);
  }
  ctx.stroke();

  // Draw piston head
  const headW = 18, headH = BLOCK_H + 8;
  ctx.fillStyle = isActive ? `hsla(${hue},70%,55%,0.95)` : `hsla(${hue},25%,30%,0.7)`;
  if (isLeft) {
    ctx.fillRect(headX - headW, py - headH / 2, headW, headH);
    // Face
    ctx.fillStyle = isActive ? `hsla(${hue},80%,75%,0.9)` : `hsla(${hue},20%,45%,0.5)`;
    ctx.fillRect(headX - 4, py - headH / 2 + 4, 4, headH - 8);
  } else {
    ctx.fillRect(headX, py - headH / 2, headW, headH);
    ctx.fillStyle = isActive ? `hsla(${hue},80%,75%,0.9)` : `hsla(${hue},20%,45%,0.5)`;
    ctx.fillRect(headX, py - headH / 2 + 4, 4, headH - 8);
  }

  // Ring (only for active piston)
  if (isActive && !p.stamping) {
    const r = getRingRadius(p);
    const ringX = isLeft ? shaftX - 12 : shaftX + SHAFT_W + 12;
    const perfect = isRingAtWall(p);

    const ringAlpha = perfect ? 1.0 : 0.5;
    const ringColor = perfect
      ? `hsla(${hue},100%,75%,${ringAlpha})`
      : `hsla(${hue},60%,55%,${ringAlpha})`;

    ctx.beginPath();
    ctx.arc(ringX, py, r, 0, Math.PI * 2);
    ctx.strokeStyle = ringColor;
    ctx.lineWidth = perfect ? 3 : 1.5;
    ctx.stroke();

    if (perfect) {
      // Outer glow
      ctx.beginPath();
      ctx.arc(ringX, py, r + 6, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${hue},100%,85%,0.25)`;
      ctx.lineWidth = 8;
      ctx.stroke();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue},80%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawImpactFlashes() {
  for (const f of impactFlashes) {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue},100%,80%,${f.life * 0.7})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawScore() {
  ctx.fillStyle = `hsla(${hue},80%,80%,0.95)`;
  ctx.font = `bold ${Math.round(H * 0.045)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, shaftTop - 16);

  ctx.fillStyle = `hsla(${hue},50%,60%,0.6)`;
  ctx.font = `${Math.round(H * 0.025)}px 'Courier New', monospace`;
  ctx.fillText(`BEST: ${best}`, W / 2, shaftTop - 34);
}

function drawHUD() {
  // Active side indicator
  const indY = H * 0.94;
  const leftX = W / 2 - 50;
  const rightX = W / 2 + 50;

  // Left indicator
  ctx.fillStyle = activeSide === 'left' ? `hsla(${hue},90%,75%,1)` : `hsla(${hue},30%,40%,0.4)`;
  ctx.beginPath();
  ctx.arc(leftX, indY, activeSide === 'left' ? 9 : 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `hsla(${hue},50%,80%,0.7)`;
  ctx.font = `${Math.round(H * 0.018)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('L', leftX, indY + 4);

  // Right indicator
  ctx.fillStyle = activeSide === 'right' ? `hsla(${hue},90%,75%,1)` : `hsla(${hue},30%,40%,0.4)`;
  ctx.beginPath();
  ctx.arc(rightX, indY, activeSide === 'right' ? 9 : 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `hsla(${hue},50%,80%,0.7)`;
  ctx.fillText('R', rightX, indY + 4);

  // Tap hint line
  ctx.fillStyle = `hsla(${hue},40%,60%,0.5)`;
  ctx.font = `${Math.round(H * 0.02)}px 'Courier New', monospace`;
  ctx.fillText('TAP WHEN RING PEAKS', W / 2, indY + 24);
}

function drawStartScreen() {
  drawBg();

  // Title
  ctx.fillStyle = `hsla(${hue},90%,80%,1)`;
  ctx.font = `bold ${Math.round(H * 0.07)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('PISTON', W / 2, H * 0.35);

  ctx.fillStyle = `hsla(${(hue + 40) % 360},90%,75%,1)`;
  ctx.fillText('PAIR', W / 2, H * 0.35 + Math.round(H * 0.08));

  // Subtitle
  ctx.fillStyle = `hsla(${hue},60%,65%,0.8)`;
  ctx.font = `${Math.round(H * 0.028)}px 'Courier New', monospace`;
  ctx.fillText('TIME THE RING. TAP. STACK.', W / 2, H * 0.55);

  // Tap to start
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 400);
  ctx.fillStyle = `hsla(${hue},80%,75%,${pulse})`;
  ctx.font = `${Math.round(H * 0.035)}px 'Courier New', monospace`;
  ctx.fillText('TAP TO START', W / 2, H * 0.70);

  if (best > 0) {
    ctx.fillStyle = `hsla(${hue},50%,60%,0.6)`;
    ctx.font = `${Math.round(H * 0.025)}px 'Courier New', monospace`;
    ctx.fillText(`BEST: ${best}`, W / 2, H * 0.78);
  }
}

function drawGameOverScreen() {
  // Darken
  ctx.fillStyle = 'rgba(10,3,25,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = `hsla(0,80%,65%,1)`;
  ctx.font = `bold ${Math.round(H * 0.06)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('MISSED', W / 2, H * 0.36);

  ctx.fillStyle = `hsla(${hue},90%,80%,1)`;
  ctx.font = `bold ${Math.round(H * 0.09)}px 'Courier New', monospace`;
  ctx.fillText(score, W / 2, H * 0.48);

  ctx.fillStyle = `hsla(${hue},50%,65%,0.8)`;
  ctx.font = `${Math.round(H * 0.028)}px 'Courier New', monospace`;
  ctx.fillText(`BEST: ${best}`, W / 2, H * 0.57);

  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 400);
  ctx.fillStyle = `hsla(${hue},80%,75%,${pulse})`;
  ctx.font = `${Math.round(H * 0.035)}px 'Courier New', monospace`;
  ctx.fillText('TAP TO RETRY', W / 2, H * 0.70);
}

// --- Update ---
function updatePistons(dt) {
  for (const [side, p] of Object.entries(pistons)) {
    p.ringT += 0.045 * p.speed * ringSpeedMult;
    if (p.stamping) {
      p.stampT = Math.min(p.stampT + dt * 3.5, 1);
    }
  }
}

function updateBlock(dt) {
  if (!block) { spawnBlock(); return; }
  if (block.locked) return;

  block.y += block.vel;

  // If block falls past stack top without being caught → game over
  const stackTop = getStackTop();
  if (block.y + block.h > stackTop + 6) {
    triggerGameOver();
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = impactFlashes.length - 1; i >= 0; i--) {
    const f = impactFlashes[i];
    f.r += (f.maxR - f.r) * 0.25;
    f.life -= 0.06;
    if (f.life <= 0) impactFlashes.splice(i, 1);
  }
}

// --- Game Loop ---
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000 * 60, 3);
  lastTime = ts;

  updateShaftGeom();

  // Shake
  let sx = 0, sy = 0;
  if (shakeFrames > 0) {
    sx = (Math.random() - 0.5) * shakeAmt;
    sy = (Math.random() - 0.5) * shakeAmt;
    shakeFrames--;
    if (shakeFrames === 0) shakeAmt = 0;
  }

  ctx.save();
  ctx.translate(sx, sy);

  if (state === 'start') {
    drawStartScreen();
  } else if (state === 'playing') {
    updatePistons(dt);
    updateBlock(dt);
    updateParticles(dt);

    diffTimer += dt;

    drawBg();
    drawShaft();
    drawStack();
    drawFallingBlock();
    drawImpactFlashes();
    drawParticles();
    drawPiston('left', pistons.left, dt);
    drawPiston('right', pistons.right, dt);
    drawScore();
    drawHUD();
  } else if (state === 'gameover') {
    updateParticles(dt);

    drawBg();
    drawShaft();
    drawStack();
    drawImpactFlashes();
    drawParticles();
    drawPiston('left', pistons.left, dt);
    drawPiston('right', pistons.right, dt);
    drawScore();
    drawGameOverScreen();
  }

  ctx.restore();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
