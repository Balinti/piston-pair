<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Piston Pair - Free HTML5 Game</title>
<meta name="description" content="Play Piston Pair - Swipe to route clanking cog blocks onto two piston platforms, building twin towers before the engine overloads.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0a00">
<meta property="og:title" content="Piston Pair - Free HTML5 Game">
<meta property="og:description" content="Route falling cog blocks onto the correct piston. Build twin towers. Don't overload the engine.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://balinti.github.io/piston-pair/">
<meta property="og:image" content="https://balinti.github.io/piston-pair/preview.png">
<meta name="twitter:card" content="summary_large_image">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4099346100621490" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#110800;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  touch-action:none;
  font-family:'Courier New',monospace;
}
#gc {
  position:relative;
  width:100%;
  max-width:420px;
}
canvas {
  display:block;
  width:100%;
  height:100%;
}
</style>
</head>
<body>
<div id="gc"><canvas id="c"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gc');
const DPR = window.devicePixelRatio || 1;
let W, H;

function resize() {
  const cw = Math.min(container.getBoundingClientRect().width || 420, 420);
  W = cw;
  H = Math.min(window.innerHeight, 750);
  container.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── constants ──────────────────────────────────────────────
const COG_COLORS = [
  { h: 28, s: 90, l: 55, name: 'orange' },   // warm orange
  { h: 185, s: 80, l: 48, name: 'teal' }     // industrial teal
];
const WILDCARD_COLOR = { h: 0, s: 0, l: 75, name: 'silver' };
const BLOCK_SIZE = 44;           // cog block size
const CEIL_PAD = 60;             // top UI zone
const FLOOR_Y_RATIO = 0.88;      // piston platform Y
const PISTON_W = 130;
const PISTON_GAP = 16;
const MAX_TOWER = 8;             // blocks before ceiling = game over

// ── state ──────────────────────────────────────────────────
let state = 'start';  // start | playing | gameover
let score = 0;
let best = parseInt(localStorage.getItem('pp_best') || '0');
let particles = [];
let bgGears = [];
let shakeFrames = 0;
let shakeAmt = 0;
let globalHue = 28;

// Towers: left and right, each has array of placed blocks (bottom→top)
let towers = { left: [], right: [] };
// Piston base colors (index into COG_COLORS)
let pistonColor = { left: 0, right: 1 };
// Falling block
let fallingBlock = null;
let fallSpeed = 2.0;
let blockCount = 0;     // total placed this game
let nextWildcard = 20;
let pistonPump = { left: 0, right: 0 };  // animation phase

// ── geometry helpers ──────────────────────────────────────
function leftPistonX() { return W / 2 - PISTON_GAP / 2 - PISTON_W; }
function rightPistonX() { return W / 2 + PISTON_GAP / 2; }
function pistonTopY() { return H * FLOOR_Y_RATIO; }
function towerTopY(side) {
  const count = towers[side].length;
  return pistonTopY() - count * (BLOCK_SIZE + 2);
}
function spawnX() { return W / 2 - BLOCK_SIZE / 2; }

// ── init ───────────────────────────────────────────────────
function initBgGears() {
  bgGears = [];
  for (let i = 0; i < 5; i++) {
    bgGears.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 30 + Math.random() * 60,
      teeth: 8 + Math.floor(Math.random() * 8),
      angle: Math.random() * Math.PI * 2,
      speed: (Math.random() - 0.5) * 0.003,
      alpha: 0.04 + Math.random() * 0.06
    });
  }
}

function initGame() {
  score = 0;
  blockCount = 0;
  fallSpeed = 2.0;
  nextWildcard = 20;
  towers = { left: [], right: [] };
  pistonColor = { left: 0, right: 1 };
  particles = [];
  shakeFrames = 0;
  fallingBlock = null;
  spawnBlock();
}

function spawnBlock() {
  const isWild = blockCount > 0 && blockCount % 20 === 0;
  // alternate color with slight randomness
  const colorIdx = Math.random() < 0.5 ? 0 : 1;
  fallingBlock = {
    x: spawnX(),
    y: CEIL_PAD - BLOCK_SIZE,
    vy: fallSpeed,
    colorIdx: isWild ? -1 : colorIdx,
    isWild,
    angle: 0,        // spin as it falls
    locked: false,
    targetSide: null,
    targetX: null,
    sliding: false,
    slideT: 0
  };
}

// ── input ──────────────────────────────────────────────────
function onTap(clientX) {
  if (state === 'start') {
    state = 'playing';
    initGame();
    return;
  }
  if (state === 'gameover') {
    state = 'playing';
    initGame();
    return;
  }
  if (state !== 'playing' || !fallingBlock || fallingBlock.locked) return;

  const side = clientX < W / 2 ? 'left' : 'right';
  routeBlock(side);
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  onTap(e.clientX - rect.left);
});
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') onTap(0);
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') onTap(W);
  else if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); onTap(W / 2 - 1); }
});

// ── game logic ─────────────────────────────────────────────
function routeBlock(side) {
  if (!fallingBlock || fallingBlock.locked) return;
  const fb = fallingBlock;

  // Validate placement
  if (!fb.isWild) {
    const tower = towers[side];
    if (tower.length > 0) {
      // piston already has blocks — color must match piston color
      const pc = pistonColor[side];
      if (fb.colorIdx !== pc) {
        // wrong color → overload
        triggerOverload(side);
        return;
      }
    }
  }

  // Accept block — slide it to target piston
  fb.locked = true;
  fb.targetSide = side;
  fb.sliding = true;
  fb.slideT = 0;
  const targetX = side === 'left'
    ? leftPistonX() + PISTON_W / 2 - BLOCK_SIZE / 2
    : rightPistonX() + PISTON_W / 2 - BLOCK_SIZE / 2;
  fb.targetX = targetX;
  fb.startX = fb.x;
  fb.startY = fb.y;
  fb.targetY = towerTopY(side) - BLOCK_SIZE;

  // If first block on this piston and not wild, set piston color
  if (towers[side].length === 0 && !fb.isWild) {
    pistonColor[side] = fb.colorIdx;
  }

  // pump animation
  pistonPump[side] = 1.0;
}

function placeBlock(fb) {
  const side = fb.targetSide;
  const tower = towers[side];

  // land it
  tower.push({
    colorIdx: fb.colorIdx,
    isWild: fb.isWild,
    y: towerTopY(side) - BLOCK_SIZE,
    bounceT: 0
  });

  score++;
  blockCount++;
  if (score > best) { best = score; localStorage.setItem('pp_best', best); }

  // Speed up every 10 blocks
  if (blockCount % 10 === 0) {
    fallSpeed = Math.min(2.0 + blockCount * 0.18, 9.0);
  }

  // Check tower height overflow
  if (tower.length >= MAX_TOWER || towerTopY(side) < CEIL_PAD + BLOCK_SIZE) {
    triggerOverload(side);
    return;
  }

  // Sparks
  const cx = fb.targetSide === 'left'
    ? leftPistonX() + PISTON_W / 2
    : rightPistonX() + PISTON_W / 2;
  const cy = towerTopY(side);
  spawnSparks(cx, cy, fb.isWild ? WILDCARD_COLOR : COG_COLORS[fb.colorIdx], 16);

  fallingBlock = null;
  spawnBlock();
}

function triggerOverload(side) {
  state = 'gameover';
  shakeFrames = 35;
  shakeAmt = 12;
  // steam burst
  const cx = side === 'left'
    ? leftPistonX() + PISTON_W / 2
    : rightPistonX() + PISTON_W / 2;
  const cy = pistonTopY();
  for (let i = 0; i < 40; i++) {
    spawnSteam(cx, cy);
  }
}

// ── particles ──────────────────────────────────────────────
function spawnSparks(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp = 1.5 + Math.random() * 5;
    particles.push({
      type: 'spark',
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp - 2,
      life: 1.0,
      decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 3,
      h: col.h, s: col.s, l: col.l + 20
    });
  }
}

function spawnSteam(x, y) {
  particles.push({
    type: 'steam',
    x: x + (Math.random() - 0.5) * 30,
    y,
    vx: (Math.random() - 0.5) * 3,
    vy: -1 - Math.random() * 4,
    life: 1.0,
    decay: 0.018 + Math.random() * 0.02,
    size: 8 + Math.random() * 12,
    h: 30, s: 20, l: 80
  });
}

// ── draw helpers ───────────────────────────────────────────
function drawGear(x, y, r, teeth, angle, alpha) {
  const ir = r * 0.65;
  const toothH = r * 0.28;
  const toothW = (2 * Math.PI * r) / (teeth * 2.5);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#c06020';
  ctx.lineWidth = 1.5;
  ctx.translate(x, y);
  ctx.rotate(angle);
  // outer ring
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();
  // inner ring
  ctx.beginPath();
  ctx.arc(0, 0, ir, 0, Math.PI * 2);
  ctx.stroke();
  // hub
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.18, 0, Math.PI * 2);
  ctx.stroke();
  // teeth
  for (let i = 0; i < teeth; i++) {
    const a = (i / teeth) * Math.PI * 2;
    const x1 = Math.cos(a - toothW / r) * r;
    const y1 = Math.sin(a - toothW / r) * r;
    const x2 = Math.cos(a - toothW / r) * (r + toothH);
    const y2 = Math.sin(a - toothW / r) * (r + toothH);
    const x3 = Math.cos(a + toothW / r) * (r + toothH);
    const y3 = Math.sin(a + toothW / r) * (r + toothH);
    const x4 = Math.cos(a + toothW / r) * r;
    const y4 = Math.sin(a + toothW / r) * r;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCogBlock(cx, cy, size, colorIdx, isWild, angle, alpha) {
  const col = isWild ? WILDCARD_COLOR : COG_COLORS[colorIdx];
  const r = size / 2;
  const teeth = 8;
  const toothSize = r * 0.22;

  ctx.save();
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;
  ctx.translate(cx, cy);
  ctx.rotate(angle || 0);

  // Wildcard glow
  if (isWild) {
    ctx.save();
    ctx.globalAlpha = (alpha || 1) * 0.35;
    const grd = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.6);
    grd.addColorStop(0, 'rgba(255,255,220,0.9)');
    grd.addColorStop(1, 'rgba(255,255,220,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Octagonal body with teeth
  ctx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a0 = (i / teeth) * Math.PI * 2 - Math.PI / teeth;
    const a1 = a0 + Math.PI / teeth * 0.5;
    const a2 = a1 + Math.PI / teeth;
    const a3 = a2 + Math.PI / teeth * 0.5;
    if (i === 0) ctx.moveTo(Math.cos(a0) * r, Math.sin(a0) * r);
    ctx.lineTo(Math.cos(a0) * r, Math.sin(a0) * r);
    ctx.lineTo(Math.cos(a1) * (r + toothSize), Math.sin(a1) * (r + toothSize));
    ctx.lineTo(Math.cos(a2) * (r + toothSize), Math.sin(a2) * (r + toothSize));
    ctx.lineTo(Math.cos(a3) * r, Math.sin(a3) * r);
  }
  ctx.closePath();

  // Fill gradient
  if (isWild) {
    const g = ctx.createRadialGradient(0, -r * 0.2, 0, 0, 0, r);
    g.addColorStop(0, `hsl(${col.h},${col.s}%,${col.l + 15}%)`);
    g.addColorStop(1, `hsl(${col.h},${col.s}%,${col.l - 20}%)`);
    ctx.fillStyle = g;
  } else {
    const g = ctx.createRadialGradient(-r * 0.2, -r * 0.3, 0, 0, 0, r * 1.1);
    g.addColorStop(0, `hsl(${col.h},${col.s}%,${col.l + 12}%)`);
    g.addColorStop(0.6, `hsl(${col.h},${col.s}%,${col.l}%)`);
    g.addColorStop(1, `hsl(${col.h},${col.s}%,${col.l - 18}%)`);
    ctx.fillStyle = g;
  }
  ctx.fill();

  // Border
  ctx.strokeStyle = isWild
    ? 'rgba(255,255,240,0.8)'
    : `hsl(${col.h},${col.s}%,${col.l + 25}%)`;
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // Hub circle
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = isWild ? 'rgba(255,255,255,0.5)' : `hsl(${col.h},${col.s}%,${col.l + 20}%)`;
  ctx.fill();
  ctx.strokeStyle = isWild ? 'rgba(255,255,255,0.8)' : `hsl(${col.h},${col.s}%,${col.l + 30}%)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Spokes
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.28, Math.sin(a) * r * 0.28);
    ctx.lineTo(Math.cos(a) * r * 0.62, Math.sin(a) * r * 0.62);
    ctx.strokeStyle = isWild ? 'rgba(255,255,255,0.4)' : `hsl(${col.h},${col.s}%,${col.l + 15}%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(Math.cos(a + Math.PI) * r * 0.28, Math.sin(a + Math.PI) * r * 0.28);
    ctx.lineTo(Math.cos(a + Math.PI) * r * 0.62, Math.sin(a + Math.PI) * r * 0.62);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPiston(side) {
  const px = side === 'left' ? leftPistonX() : rightPistonX();
  const py = pistonTopY();
  const col = COG_COLORS[pistonColor[side]];
  const pump = pistonPump[side];

  // Cylinder body
  ctx.fillStyle = '#2a1a08';
  ctx.strokeStyle = '#6b3d10';
  ctx.lineWidth = 2;
  ctx.fillRect(px, py, PISTON_W, 28);
  ctx.strokeRect(px, py, PISTON_W, 28);

  // Color accent stripe
  ctx.fillStyle = `hsla(${col.h},${col.s}%,${col.l}%,0.7)`;
  ctx.fillRect(px + 4, py + 4, PISTON_W - 8, 8);

  // Piston shaft (animated)
  const shaftY = py + 14 + pump * 12;
  ctx.fillStyle = '#8a5a20';
  ctx.fillRect(px + PISTON_W / 2 - 8, shaftY, 16, 40 + pump * 8);
  ctx.strokeStyle = '#c08040';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + PISTON_W / 2 - 8, shaftY, 16, 40 + pump * 8);

  // Rivets
  ctx.fillStyle = '#c0a060';
  [px + 12, px + PISTON_W - 12].forEach(rx => {
    ctx.beginPath();
    ctx.arc(rx, py + 14, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Platform glow when active
  if (pump > 0.1) {
    ctx.save();
    ctx.globalAlpha = pump * 0.4;
    ctx.strokeStyle = `hsl(${col.h},${col.s}%,${col.l + 20}%)`;
    ctx.lineWidth = 3;
    ctx.strokeRect(px - 2, py - 2, PISTON_W + 4, 32);
    ctx.restore();
  }

  // Color indicator label
  ctx.fillStyle = `hsla(${col.h},${col.s}%,${col.l + 15}%,0.9)`;
  ctx.font = `bold 11px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(col.name.toUpperCase(), px + PISTON_W / 2, py + 20);
}

function drawTower(side) {
  const tower = towers[side];
  const px = side === 'left' ? leftPistonX() : rightPistonX();
  const baseY = pistonTopY();

  for (let i = 0; i < tower.length; i++) {
    const blk = tower[i];
    const compress = Math.min(i * 0.5, 3); // slight compression visual
    const bY = baseY - (i + 1) * (BLOCK_SIZE + 2) + compress;
    const cx = px + PISTON_W / 2;
    const cy = bY + BLOCK_SIZE / 2;
    drawCogBlock(cx, cy, BLOCK_SIZE - 2, blk.colorIdx, blk.isWild, blk.angle || 0);
  }
}

function drawFallingBlock() {
  const fb = fallingBlock;
  if (!fb) return;
  drawCogBlock(fb.x + BLOCK_SIZE / 2, fb.y + BLOCK_SIZE / 2,
    BLOCK_SIZE, fb.colorIdx, fb.isWild, fb.angle);

  // Drop shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(fb.x + BLOCK_SIZE / 2, fb.y + BLOCK_SIZE + 4, BLOCK_SIZE / 2 - 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    if (p.type === 'steam') {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0, `hsla(${p.h},${p.s}%,${p.l}%,0.6)`);
      g.addColorStop(1, `hsla(${p.h},${p.s}%,${p.l}%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = `hsl(${p.h},${p.s}%,${p.l}%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0e0600');
  grad.addColorStop(0.5, '#1a0c04');
  grad.addColorStop(1, '#0a0400');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(180,80,10,0.05)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Background gears
  for (const g of bgGears) {
    drawGear(g.x, g.y, g.r, g.teeth, g.angle, g.alpha);
  }
}

function drawDivider() {
  // Center divider line
  ctx.strokeStyle = 'rgba(180,80,10,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.moveTo(W / 2, CEIL_PAD);
  ctx.lineTo(W / 2, pistonTopY());
  ctx.stroke();
  ctx.setLineDash([]);

  // L/R labels
  ctx.fillStyle = 'rgba(200,100,20,0.4)';
  ctx.font = `bold 13px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('◀ L', W / 4, CEIL_PAD + 22);
  ctx.fillText('R ▶', W * 3 / 4, CEIL_PAD + 22);
}

function drawHUD() {
  ctx.fillStyle = '#c07030';
  ctx.font = `bold 15px 'Courier New',monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`BLOCKS PLACED: ${score}`, W / 2, 26);

  ctx.fillStyle = 'rgba(180,100,30,0.6)';
  ctx.font = `11px 'Courier New',monospace`;
  ctx.fillText(`BEST: ${best}`, W / 2, 44);
}

function drawCeilingWarning() {
  // Warning line at ceiling
  ctx.strokeStyle = 'rgba(200,50,10,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(0, CEIL_PAD + BLOCK_SIZE);
  ctx.lineTo(W, CEIL_PAD + BLOCK_SIZE);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawStartScreen() {
  drawBg();

  // Animated background gears
  for (const g of bgGears) {
    drawGear(g.x, g.y, g.r, g.teeth, g.angle, g.alpha * 2);
  }

  // Title
  ctx.save();
  ctx.textAlign = 'center';

  ctx.fillStyle = '#c06010';
  ctx.font = `bold ${Math.round(H * 0.085)}px 'Courier New',monospace`;
  ctx.shadowColor = '#ff8020';
  ctx.shadowBlur = 20;
  ctx.fillText('PISTON', W / 2, H * 0.30);
  ctx.fillStyle = '#e09040';
  ctx.fillText('PAIR', W / 2, H * 0.30 + Math.round(H * 0.09));
  ctx.shadowBlur = 0;

  // Show sample cogs
  drawCogBlock(W / 2 - 55, H * 0.50, 38, 0, false, Date.now() * 0.001);
  drawCogBlock(W / 2 + 55, H * 0.50, 38, 1, false, -Date.now() * 0.0012);

  ctx.fillStyle = 'rgba(200,120,40,0.7)';
  ctx.font = `12px 'Courier New',monospace`;
  ctx.fillText('← TAP LEFT or RIGHT →', W / 2, H * 0.63);
  ctx.fillText('ROUTE COGS TO MATCHING PISTONS', W / 2, H * 0.68);

  const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 450);
  ctx.fillStyle = `rgba(230,150,40,${pulse})`;
  ctx.font = `bold 18px 'Courier New',monospace`;
  ctx.fillText('TAP TO START', W / 2, H * 0.80);

  if (best > 0) {
    ctx.fillStyle = 'rgba(180,100,30,0.7)';
    ctx.font = `12px 'Courier New',monospace`;
    ctx.fillText(`BEST: ${best} BLOCKS`, W / 2, H * 0.87);
  }

  ctx.restore();
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(8,3,0,0.80)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4010';
  ctx.font = `bold ${Math.round(H * 0.065)}px 'Courier New',monospace`;
  ctx.shadowColor = '#ff2000';
  ctx.shadowBlur = 18;
  ctx.fillText('OVERLOAD!', W / 2, H * 0.33);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#e09040';
  ctx.font = `bold ${Math.round(H * 0.10)}px 'Courier New',monospace`;
  ctx.fillText(score, W / 2, H * 0.47);

  ctx.fillStyle = 'rgba(200,120,40,0.75)';
  ctx.font = `13px 'Courier New',monospace`;
  ctx.fillText('BLOCKS PLACED', W / 2, H * 0.54);

  ctx.fillStyle = 'rgba(180,100,30,0.7)';
  ctx.font = `12px 'Courier New',monospace`;
  ctx.fillText(`BEST: ${best}`, W / 2, H * 0.61);

  const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 450);
  ctx.fillStyle = `rgba(230,150,40,${pulse})`;
  ctx.font = `bold 18px 'Courier New',monospace`;
  ctx.fillText('TAP TO RETRY', W / 2, H * 0.75);

  ctx.restore();
}

// ── update ──────────────────────────────────────────────────
function updateBgGears(dt) {
  for (const g of bgGears) g.angle += g.speed * dt * 60;
}

function updateFallingBlock(dt) {
  const fb = fallingBlock;
  if (!fb) return;

  if (fb.sliding) {
    fb.slideT = Math.min(fb.slideT + dt * 5, 1);
    const t = 1 - Math.pow(1 - fb.slideT, 3); // ease out cubic
    fb.x = fb.startX + (fb.targetX - fb.startX) * t;
    fb.y = fb.startY + (fb.targetY - fb.startY) * t;
    fb.angle += dt * 8;
    if (fb.slideT >= 1) {
      placeBlock(fb);
    }
    return;
  }

  fb.y += fb.vy * dt * 60;
  fb.angle += dt * 1.5;

  // If block falls past pistons without being routed → game over
  if (fb.y > pistonTopY() + 10) {
    // missed — treat as overload
    state = 'gameover';
    shakeFrames = 28;
    shakeAmt = 10;
    spawnSteam(W / 2, pistonTopY());
    for (let i = 0; i < 20; i++) spawnSteam(W / 2 + (Math.random() - 0.5) * 80, pistonTopY());
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.type === 'spark') p.vy += 0.15;
    else p.size += dt * 20;
    p.life -= p.decay * dt * 60;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updatePistonPump(dt) {
  for (const side of ['left', 'right']) {
    if (pistonPump[side] > 0) {
      pistonPump[side] = Math.max(0, pistonPump[side] - dt * 3);
    }
  }
}

// ── main loop ───────────────────────────────────────────────
let last = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  // Shake offset
  let sx = 0, sy = 0;
  if (shakeFrames > 0) {
    sx = (Math.random() - 0.5) * shakeAmt;
    sy = (Math.random() - 0.5) * shakeAmt;
    shakeFrames--;
    shakeAmt *= 0.9;
  }

  ctx.save();
  ctx.translate(sx, sy);

  if (state === 'start') {
    updateBgGears(dt);
    drawStartScreen();
  } else if (state === 'playing') {
    updateBgGears(dt);
    updateFallingBlock(dt);
    updateParticles(dt);
    updatePistonPump(dt);

    drawBg();
    drawCeilingWarning();
    drawDivider();
    drawTower('left');
    drawTower('right');
    drawPiston('left');
    drawPiston('right');
    drawFallingBlock();
    drawParticles();
    drawHUD();
  } else if (state === 'gameover') {
    updateBgGears(dt);
    updateParticles(dt);

    drawBg();
    drawCeilingWarning();
    drawDivider();
    drawTower('left');
    drawTower('right');
    drawPiston('left');
    drawPiston('right');
    drawParticles();
    drawHUD();
    drawGameOverScreen();
  }

  ctx.restore();
}

initBgGears();
requestAnimationFrame(loop);
</script>
